{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Geradores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: #f5f6f8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-card {
            width: 420px;
            max-width: 90vw;
            border-radius: 18px;
            padding: 32px;
            background: white;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
        }

        .menu-card h1 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .menu-card .btn {
            padding: 16px;
            font-size: 1.05rem;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="menu-card">
    <h1>Sistema de Geradores</h1>

    <div class="d-grid gap-3">
        <a href="{% url 'operacao:home' %}" class="btn btn-outline-primary">
            Visualizar projetos existentes
        </a>

        <a href="{% url 'operacao:home' %}?abrir_modal_os=1" class="btn btn-outline-success">
            Criar novo projeto
        </a>

        <a href="{% url 'calculos:home' %}" class="btn btn-outline-warning">
            Cálculos personalizados
        </a>
    </div>
</div>

</body>
</html>
